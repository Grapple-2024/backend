AWSTemplateFormatVersion: 2010-09-09
Description: >-
  Grapple Backend Service
Transform:
  - AWS::Serverless-2016-10-31

Globals:
  Function:
    Timeout: 200
    Runtime: provided.al2

Parameters:
    # all parameters are overriden by samconfig.toml during 'make deploy' recipe.
    Environment:
      Description: "The environment to deploy to, either test or prod is currently supported."
      Type: 'String'
      Default: 'local'
    # all parameters are overriden by samconfig.toml during 'make deploy' recipe.
    ApiUrl:
      Description: "The base api url for grapple, must be hard-coded in samconfig.yml!"
      Type: 'String'
      Default: ''
    MongoEndpoint:
      Description: "The endpoint for mongodb"
      Type: 'String'
      Default: "mongodb://mongodb:27017"
    DynamoDBEndpoint:
      Description: "The endpoint for dynamodb"
      Type: 'String'
      Default: "https://dynamodb.us-west-1.amazonaws.com"
    SendGridAPIKey:
      Description: "The send grid API Key"
      Type: 'String'
      Default: "<sendgrid-api-key>"
    CognitoClientID:
      Description: "The endpoint for dynamodb"
      Type: 'String'
      Default: ""
    CognitoClientSecret:
      Description: "The cognito client secret"
      Type: 'String'
      Default: ""
    VpcCIDR:
      Description: Please enter the IP range (CIDR notation) for the VPC in which the lambda functions will execute.
      Type: String
      Default: 10.192.0.0/16

Resources:
  Gateway:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      GatewayResponses:
        DEFAULT_4XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              Access-Control-Allow-Methods: "'GET,OPTIONS,POST'"
        DEFAULT_5XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              Access-Control-Allow-Methods: "'GET,OPTIONS,POST'"
      Cors:
        AllowOrigin: "'*'"
        AllowMethods: "'POST, GET, DELETE, PUT, HEAD, OPTIONS'"
        AllowHeaders: "'*'"
      Auth:
        AddDefaultAuthorizerToCorsPreflight: false
        DefaultAuthorizer: MyCognitoAuth # OPTIONAL
        Authorizers:
          MyCognitoAuth:
            UserPoolArn: arn:aws:cognito-idp:us-west-1:381491926210:userpool/us-west-1_HT5oR6AwO # Can also accept an array
            Identity: # OPTIONAL
              Header: Authorization # OPTIONAL; Default: 'Authorization'

  UserProfilesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub grapple-${Environment}-user-profiles
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 1
        WriteCapacityUnits: 1

  EmailsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub grapple-${Environment}-emails
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
        - AttributeName: dummy
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 1
        WriteCapacityUnits: 1
      GlobalSecondaryIndexes:
        - IndexName: "CreatedAtIndex"
          KeySchema:
          - AttributeName: dummy
            KeyType: HASH
          - AttributeName: created_at
            KeyType: RANGE
          Projection: 
            ProjectionType: "ALL"
          ProvisionedThroughput:
            ReadCapacityUnits: 1
            WriteCapacityUnits: 1

  GymsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub grapple-${Environment}-gyms
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: creator
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      OnDemandThroughput:
        MaxReadRequestUnits: 10
        MaxWriteRequestUnits: 1
      GlobalSecondaryIndexes:
        - IndexName: "CreatorIndex"
          KeySchema: 
          - AttributeName: creator
            KeyType: HASH
          Projection: 
            ProjectionType: "ALL"
          OnDemandThroughput:
            MaxReadRequestUnits: 10
            MaxWriteRequestUnits: 1

  GymRequestsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub grapple-${Environment}-gym-requests
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: gym_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
        - AttributeName: dummy
          AttributeType: S
        - AttributeName: requestor_id
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 1
        WriteCapacityUnits: 1
      GlobalSecondaryIndexes:
        - IndexName: "GymIndex"
          KeySchema: 
          - AttributeName: gym_id
            KeyType: HASH
          Projection: 
            ProjectionType: "ALL"
          ProvisionedThroughput:
            ReadCapacityUnits: 1
            WriteCapacityUnits: 1
        - IndexName: "CreatedAtIndex"
          KeySchema:
          - AttributeName: dummy
            KeyType: HASH
          - AttributeName: created_at
            KeyType: RANGE
          Projection: 
            ProjectionType: "ALL"
          ProvisionedThroughput:
            ReadCapacityUnits: 1
            WriteCapacityUnits: 1
        - IndexName: "RequestorIndex"
          KeySchema:
          - AttributeName: requestor_id
            KeyType: HASH
          Projection: 
            ProjectionType: "ALL"
          ProvisionedThroughput:
            ReadCapacityUnits: 1
            WriteCapacityUnits: 1

  GymAnnouncementsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub grapple-${Environment}-gym-announcements
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: dummy
          AttributeType: S
        - AttributeName: updated_at
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 1
        WriteCapacityUnits: 1
      GlobalSecondaryIndexes:
        - IndexName: "LastUpdatedIndex"
          KeySchema: 
          - AttributeName: dummy
            KeyType: HASH
          - AttributeName: updated_at
            KeyType: RANGE
          Projection: 
            ProjectionType: "ALL"
          ProvisionedThroughput:
            ReadCapacityUnits: 1
            WriteCapacityUnits: 1

  UserAssetsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub grapple-${Environment}-user-assets
      AttributeDefinitions:
        - AttributeName: url
          AttributeType: S
        - AttributeName: user_id
          AttributeType: S
      KeySchema:
        - AttributeName: url
          KeyType: HASH
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 1
        WriteCapacityUnits: 1
      GlobalSecondaryIndexes:
        - IndexName: "UserIndex"
          KeySchema:
          - AttributeName: user_id
            KeyType: HASH
          Projection: 
            ProjectionType: "ALL"
          ProvisionedThroughput:
            ReadCapacityUnits: 1
            WriteCapacityUnits: 1
 
  CreateProfileOnSignupLambda:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: go1.x
    Properties:
      FunctionName: !Sub grapple-${Environment}-CreateProfileOnSignup
      CodeUri: ./cmd/post-signup-lambda
      Handler: post-signup
      Runtime: provided.al2
      Architectures:
        - x86_64
      MemorySize: 1024
      Timeout: 30
      Environment:
        Variables:
          MONGO_ENDPOINT: !Ref MongoEndpoint
      Tracing: Active

  GrappleLambda:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: go1.x
    Properties:
      FunctionName: !Sub grapple-backend-${Environment}
      CodeUri: ./cmd/backend
      Handler: bootstrap
      Runtime: provided.al2
      Architectures:
        - x86_64
      MemorySize: 1024
      Timeout: 30
      Environment:
        Variables:
          API_URL: !Ref ApiUrl
          MONGO_ENDPOINT: !Ref MongoEndpoint
          DYNAMODB_ENDPOINT: !Ref DynamoDBEndpoint
          GYMS_TABLE_NAME: !Sub grapple-${Environment}-gyms
          GYM_REQUESTS_TABLE_NAME: !Sub grapple-${Environment}-gym-requests
          GYM_ANNOUNCEMENTS_TABLE_NAME: !Sub grapple-${Environment}-gym-announcements
          GYM_VIDEOS_TABLE_NAME: !Sub grapple-${Environment}-gym-videos
          GYM_VIDEO_SERIES_TABLE_NAME: !Sub grapple-${Environment}-gym-video-series
          EMAILS_TABLE_NAME: !Sub grapple-${Environment}-emails
          USER_PROFILES_TABLE_NAME: !Sub grapple-${Environment}-user-profiles
          PUBLIC_USER_ASSETS_TABLE_NAME: !Sub grapple-${Environment}-user-assets
          PUBLIC_USER_ASSETS_BUCKET_NAME: !Sub grapple-${Environment}-public-user-assets
          GYM_VIDEOS_BUCKET_NAME: !Sub grapple-${Environment}-gym-videos
          PUBLIC_ASSETS_BUCKET_NAME: !Sub grapple-${Environment}-public-assets
          SENDGRID_API_KEY: !Ref SendGridAPIKey
          COGNITO_CLIENT_ID: !Ref CognitoClientID
          COGNITO_CLIENT_SECRET: !Ref CognitoClientID
      Tracing: Active
      Role: !GetAtt FunctionRole.Arn
      Events:
        ##### V2 Events
        # Gyms
        GetGym:
          Type: Api
          Properties:
            Path: /gyms/{id}
            Method: GET
            RestApiId: !Ref Gateway
            Auth:
              Authorizer: NONE # Turn off Authorization for this event

        GetGyms:
          Type: Api
          Properties:
            Path: /gyms
            Method: GET
            RestApiId: !Ref Gateway
            Auth:
              Authorizer: NONE # Turn off Authorization for this event

        CreateGym:
          Type: Api
          Properties:
            Path: /gyms
            Method: POST
            RestApiId: !Ref Gateway

        UpdateGym:
          Type: Api
          Properties:
            Path: /gyms/{id}
            Method: PUT
            RestApiId: !Ref Gateway

        DeleteGym:
          Type: Api
          Properties:
            Path: /gyms/{id}
            Method: DELETE
            RestApiId: !Ref Gateway

        # Gym Requests
        GetGymRequest:
          Type: Api
          Properties:
            Path: /gym-requests/{id}
            Method: GET
            RestApiId: !Ref Gateway

        GetGymRequests:
          Type: Api
          Properties:
            Path: /gym-requests
            Method: GET
            RestApiId: !Ref Gateway

        CreateGymRequest:
          Type: Api
          Properties:
            Path: /gym-requests
            Method: POST
            RestApiId: !Ref Gateway

        UpdateGymRequest:
          Type: Api
          Properties:
            Path: /gym-requests/{id}
            Method: PUT
            RestApiId: !Ref Gateway

        DeleteGymRequest:
          Type: Api
          Properties:
            Path: /gym-requests/{id}
            Method: DELETE
            RestApiId: !Ref Gateway

        # Announcements
        GetAnnouncement:
          Type: Api
          Properties:
            Path: /announcements/{id}
            Method: GET
            RestApiId: !Ref Gateway

        GetAnnouncements:
          Type: Api
          Properties:
            Path: /announcements
            Method: GET
            RestApiId: !Ref Gateway

        CreateAnnouncement:
          Type: Api
          Properties:
            Path: /announcements
            Method: POST
            RestApiId: !Ref Gateway

        UpdateAnnouncement:
          Type: Api
          Properties:
            Path: /announcements/{id}
            Method: PUT
            RestApiId: !Ref Gateway

        DeleteAnnouncement:
          Type: Api
          Properties:
            Path: /announcements/{id}
            Method: DELETE
            RestApiId: !Ref Gateway

        # Gym Series
        GetSeriesByID:
          Type: Api
          Properties:
            Path: /gym-series/{id}
            Method: GET
            RestApiId: !Ref Gateway

        GetSeries:
          Type: Api
          Properties:
            Path: /gym-series
            Method: GET
            RestApiId: !Ref Gateway

        CreateSeries:
          Type: Api
          Properties:
            Path: /gym-series
            Method: POST
            RestApiId: !Ref Gateway

        GenerateUploadURL:
          Type: Api
          Properties:
            Path: /gym-series/{id}/presign
            Method: PUT
            RestApiId: !Ref Gateway

        UpsertVideo:
          Type: Api
          Properties:
            Path: /gym-series/{id}/videos
            Method: PUT
            RestApiId: !Ref Gateway

        UpdateSeries:
          Type: Api
          Properties:
            Path: /gym-series/{id}
            Method: PUT
            RestApiId: !Ref Gateway

        DeleteSeries:
          Type: Api
          Properties:
            Path: /gym-series/{id}
            Method: DELETE
            RestApiId: !Ref Gateway

        DeleteSeriesVideo:
          Type: Api
          Properties:
            Path: /gym-series/{id}/videos/{video_id}
            Method: DELETE
            RestApiId: !Ref Gateway

        # Techniques
        GetTechniques:
          Type: Api
          Properties:
            Path: /techniques/{id}
            Method: GET
            RestApiId: !Ref Gateway
            Auth:
              Authorizer: NONE # Turn off Authorization for this event

        GetTechnique:
          Type: Api
          Properties:
            Path: /techniques
            Method: GET
            RestApiId: !Ref Gateway
            Auth:
              Authorizer: NONE # Turn off Authorization for this event

        CreateTechnique:
          Type: Api
          Properties:
            Path: /techniques
            Method: POST
            RestApiId: !Ref Gateway

        UpdateTechnique:
          Type: Api
          Properties:
            Path: /techniques/{id}
            Method: PUT
            RestApiId: !Ref Gateway

        DeleteTechnique:
          Type: Api
          Properties:
            Path: /techniques/{id}
            Method: DELETE
            RestApiId: !Ref Gateway

        # Profiles
        GetProfiles:
          Type: Api
          Properties:
            Path: /profiles
            Method: GET
            RestApiId: !Ref Gateway

        GeneratePresignedAvatarUploadURL:
          Type: Api
          Properties:
            Path: /profiles/avatar
            Method: PUT
            RestApiId: !Ref Gateway

        UpsertUserProfile:
          Type: Api
          Properties:
            Path: /profiles
            Method: PUT
            RestApiId: !Ref Gateway

        # DeleteUserProfile:
        #   Type: Api
        #   Properties:
        #     Path: /profiles/{id}
        #     Method: DELETE
        #     RestApiId: !Ref Gateway


        #### V1 Events
        # Emails - Marketing


  FunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "grapple-${Environment}-backend-execution-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 
                  - s3:*
                Resource:
                  - !Sub arn:aws:s3:::grapple-${Environment}-gym-videos
                  - !Sub arn:aws:s3:::grapple-${Environment}-gym-videos/*
                  - !Sub arn:aws:s3:::grapple-${Environment}-public-user-assets
                  - !Sub arn:aws:s3:::grapple-${Environment}-public-user-assets/*
        - PolicyName: CognitoIdpAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:AdminListGroupsForUser
                Resource: '*'
              - Effect: Allow
                Action:
                  - cognito-idp:AdminAddUserToGroup
                Resource: '*'
Outputs:
  API:
    Description: "API Gateway endpoint URL for the Lambda function"
    Value: !Sub "https://${Gateway}.execute-api.${AWS::Region}.amazonaws.com/"
  GrappleLambdaARN:
    Description: "Content Service Lambda Function ARN"
    Value: !GetAtt GrappleLambda.Arn
  GrappleFunctionIAMRole:
    Description: "Implicit IAM Role created for Grapple Backend Lambda function"
    Value: !GetAtt FunctionRole.Arn