AWSTemplateFormatVersion: 2010-09-09
Description: >-
  Grapple Backend Service
Transform:
  - AWS::Serverless-2016-10-31

Globals:
  Function:
    Timeout: 200
    Runtime: provided.al2

Parameters:
    # all parameters are overriden by samconfig.toml during 'make deploy' recipe.
    Environment:
      Description: "The environment to deploy to, either test or prod is currently supported."
      Type: 'String'
      Default: 'test'
    DynamoDBEndpoint:
      Description: "The endpoint for dynamodb"
      Type: 'String'
      Default: "https://dynamodb.us-west-1.amazonaws.com"
    SendGridAPIKey:
      Description: "The send grid API Key"
      Type: 'String'
      Default: "<sendgrid-api-key>"
    CognitoClientID:
      Description: "The endpoint for dynamodb"
      Type: 'String'
      Default: ""
    CognitoClientSecret:
      Description: "The cognito client secret"
      Type: 'String'
      Default: ""

Resources:
  Gateway:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      GatewayResponses:
        DEFAULT_4XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              Access-Control-Allow-Methods: "'GET,OPTIONS,POST'"
        DEFAULT_5XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              Access-Control-Allow-Methods: "'GET,OPTIONS,POST'"
      Cors:
        AllowOrigin: "'*'"
        AllowMethods: "'POST, GET, DELETE, PUT, HEAD, OPTIONS'"
        AllowHeaders: "'*'"
      Auth:
        AddDefaultAuthorizerToCorsPreflight: false
        DefaultAuthorizer: MyCognitoAuth # OPTIONAL
        Authorizers:
          MyCognitoAuth:
            UserPoolArn: arn:aws:cognito-idp:us-west-1:381491926210:userpool/us-west-1_HT5oR6AwO # Can also accept an array
            Identity: # OPTIONAL
              Header: Authorization # OPTIONAL; Default: 'Authorization'

  UserProfilesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub grapple-${Environment}-user-profiles
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 1
        WriteCapacityUnits: 1

  EmailsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub grapple-${Environment}-emails
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
        - AttributeName: dummy
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 1
        WriteCapacityUnits: 1
      GlobalSecondaryIndexes:
        - IndexName: "CreatedAtIndex"
          KeySchema:
          - AttributeName: dummy
            KeyType: HASH
          - AttributeName: created_at
            KeyType: RANGE
          Projection: 
            ProjectionType: "ALL"
          ProvisionedThroughput:
            ReadCapacityUnits: 1
            WriteCapacityUnits: 1

  GymsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub grapple-${Environment}-gyms
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: creator
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      OnDemandThroughput:
        MaxReadRequestUnits: 10
        MaxWriteRequestUnits: 1
      GlobalSecondaryIndexes:
        - IndexName: "CreatorIndex"
          KeySchema: 
          - AttributeName: creator
            KeyType: HASH
          Projection: 
            ProjectionType: "ALL"
          OnDemandThroughput:
            MaxReadRequestUnits: 10
            MaxWriteRequestUnits: 1

  GymRequestsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub grapple-${Environment}-gym-requests
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: gym_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
        - AttributeName: dummy
          AttributeType: S
        - AttributeName: requestor_id
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 1
        WriteCapacityUnits: 1
      GlobalSecondaryIndexes:
        - IndexName: "GymIndex"
          KeySchema: 
          - AttributeName: gym_id
            KeyType: HASH
          Projection: 
            ProjectionType: "ALL"
          ProvisionedThroughput:
            ReadCapacityUnits: 1
            WriteCapacityUnits: 1
        - IndexName: "CreatedAtIndex"
          KeySchema:
          - AttributeName: dummy
            KeyType: HASH
          - AttributeName: created_at
            KeyType: RANGE
          Projection: 
            ProjectionType: "ALL"
          ProvisionedThroughput:
            ReadCapacityUnits: 1
            WriteCapacityUnits: 1
        - IndexName: "RequestorIndex"
          KeySchema:
          - AttributeName: requestor_id
            KeyType: HASH
          Projection: 
            ProjectionType: "ALL"
          ProvisionedThroughput:
            ReadCapacityUnits: 1
            WriteCapacityUnits: 1

  GymAnnouncementsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub grapple-${Environment}-gym-announcements
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: dummy
          AttributeType: S
        - AttributeName: updated_at
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 1
        WriteCapacityUnits: 1
      GlobalSecondaryIndexes:
        - IndexName: "LastUpdatedIndex"
          KeySchema: 
          - AttributeName: dummy
            KeyType: HASH
          - AttributeName: updated_at
            KeyType: RANGE
          Projection: 
            ProjectionType: "ALL"
          ProvisionedThroughput:
            ReadCapacityUnits: 1
            WriteCapacityUnits: 1

  GymVideosTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub grapple-${Environment}-gym-videos
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: gym_id
          AttributeType: S
        - AttributeName: dummy
          AttributeType: S
        - AttributeName: updated_at
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 1
        WriteCapacityUnits: 1
      GlobalSecondaryIndexes:
        - IndexName: "GymIndex"
          KeySchema: 
          - AttributeName: gym_id
            KeyType: HASH
          Projection:
            ProjectionType: "ALL"
          ProvisionedThroughput:
            ReadCapacityUnits: 1
            WriteCapacityUnits: 1
        - IndexName: "LastUpdatedIndex"
          KeySchema:
          - AttributeName: dummy
            KeyType: HASH
          - AttributeName: updated_at
            KeyType: RANGE
          Projection: 
            ProjectionType: "ALL"
          ProvisionedThroughput:
            ReadCapacityUnits: 1
            WriteCapacityUnits: 1

  GymVideoSeriesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub grapple-${Environment}-gym-video-series
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: gym_id
          AttributeType: S
        - AttributeName: dummy
          AttributeType: S
        - AttributeName: updated_at
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 1
        WriteCapacityUnits: 1
      GlobalSecondaryIndexes:
        - IndexName: "GymIndex"
          KeySchema: 
          - AttributeName: gym_id
            KeyType: HASH
          Projection:
            ProjectionType: "ALL"
          ProvisionedThroughput:
            ReadCapacityUnits: 1
            WriteCapacityUnits: 1
        - IndexName: "LastUpdatedIndex"
          KeySchema:
          - AttributeName: dummy
            KeyType: HASH
          - AttributeName: updated_at
            KeyType: RANGE
          Projection: 
            ProjectionType: "ALL"
          ProvisionedThroughput:
            ReadCapacityUnits: 1
            WriteCapacityUnits: 1

  UserAssetsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub grapple-${Environment}-user-assets
      AttributeDefinitions:
        - AttributeName: url
          AttributeType: S
        - AttributeName: user_id
          AttributeType: S
      KeySchema:
        - AttributeName: url
          KeyType: HASH
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 1
        WriteCapacityUnits: 1
      GlobalSecondaryIndexes:
        - IndexName: "UserIndex"
          KeySchema:
          - AttributeName: user_id
            KeyType: HASH
          Projection: 
            ProjectionType: "ALL"
          ProvisionedThroughput:
            ReadCapacityUnits: 1
            WriteCapacityUnits: 1

  Function:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: go1.x
    Properties:
      FunctionName: !Sub grapple-backend-${Environment}
      CodeUri: ./cmd/backend
      Handler: bootstrap
      Runtime: provided.al2
      Architectures:
        - x86_64
      MemorySize: 1024
      Timeout: 30
      Environment:
        Variables:
          DYNAMODB_ENDPOINT: !Ref DynamoDBEndpoint
          GYMS_TABLE_NAME: !Sub grapple-${Environment}-gyms
          GYM_REQUESTS_TABLE_NAME: !Sub grapple-${Environment}-gym-requests
          GYM_ANNOUNCEMENTS_TABLE_NAME: !Sub grapple-${Environment}-gym-announcements
          GYM_VIDEOS_TABLE_NAME: !Sub grapple-${Environment}-gym-videos
          GYM_VIDEO_SERIES_TABLE_NAME: !Sub grapple-${Environment}-gym-video-series
          EMAILS_TABLE_NAME: !Sub grapple-${Environment}-emails
          USER_PROFILES_TABLE_NAME: !Sub grapple-${Environment}-user-profiles
          PUBLIC_USER_ASSETS_TABLE_NAME: !Sub grapple-${Environment}-user-assets
          PUBLIC_USER_ASSETS_BUCKET_NAME: !Sub grapple-${Environment}-public-user-assets
          GYM_VIDEOS_BUCKET_NAME: !Sub grapple-${Environment}-gym-videos
          SENDGRID_API_KEY: !Ref SendGridAPIKey
          COGNITO_CLIENT_ID: !Ref CognitoClientID
          COGNITO_CLIENT_SECRET: !Ref CognitoClientID

      Tracing: Active
      Policies:
        - S3FullAccessPolicy:
            BucketName: !Sub grapple-${Environment}-gym-videos
        - S3FullAccessPolicy:
            BucketName: !Sub grapple-${Environment}-public-user-assets
        - DynamoDBCrudPolicy:
            TableName: !Ref GymsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref GymRequestsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref GymAnnouncementsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref GymVideosTable
        - DynamoDBCrudPolicy:
            TableName: !Ref GymVideoSeriesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref EmailsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UserAssetsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UserProfilesTable
        - Version: '2012-10-17' # Policy Document
          Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
              Resource: '*'
        - Version: '2012-10-17' # Policy Document
          Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminListGroupsForUser
              Resource: '*'
        - Version: '2012-10-17' # Policy Document
          Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminAddUserToGroup
              Resource: '*'
      Events:
        # Emails - Marketing
        GetEmail:
          Type: Api
          Properties:
            Path: /emails/{id}
            Method: GET
            RestApiId: !Ref Gateway
            Auth:
              Authorizer: NONE # Turn off Authorization for this event

        GetEmails:
          Type: Api
          Properties:
            Path: /emails
            Method: GET
            RestApiId: !Ref Gateway
            Auth:
              Authorizer: NONE # Turn off Authorization for this event

        CreateEmail:
          Type: Api
          Properties:
            Path: /emails
            Method: POST
            RestApiId: !Ref Gateway
            Auth:
              Authorizer: NONE # Turn off Authorization for this event

        UpdateEmail:
          Type: Api
          Properties:
            Path: /emails/{id}
            Method: PUT
            RestApiId: !Ref Gateway

        DeleteEmail:
          Type: Api
          Properties:
            Path: /emails/{id}
            Method: DELETE
            RestApiId: !Ref Gateway
            Auth:
              Authorizer: NONE # Turn off Authorization for this event

        # Gyms
        GetGym:
          Type: Api
          Properties:
            Path: /gyms/{id}
            Method: GET
            RestApiId: !Ref Gateway
            Auth:
              Authorizer: NONE # Turn off Authorization for this event

        GetGyms:
          Type: Api
          Properties:
            Path: /gyms
            Method: GET
            RestApiId: !Ref Gateway
            Auth:
              Authorizer: NONE # Turn off Authorization for this event

        CreateGym:
          Type: Api
          Properties:
            Path: /gyms
            Method: POST
            RestApiId: !Ref Gateway

        UpdateGym:
          Type: Api
          Properties:
            Path: /gyms/{id}
            Method: PUT
            RestApiId: !Ref Gateway

        DeleteGym:
          Type: Api
          Properties:
            Path: /gyms/{id}
            Method: DELETE
            RestApiId: !Ref Gateway

        # Gym Requests
        GetGymRequest:
          Type: Api
          Properties:
            Path: /gym-requests/{id}
            Method: GET
            RestApiId: !Ref Gateway
            
        GetGymRequests:
          Type: Api
          Properties:
            Path: /gym-requests
            Method: GET
            RestApiId: !Ref Gateway

        CreateGymRequest:
          Type: Api
          Properties:
            Path: /gym-requests
            Method: POST
            RestApiId: !Ref Gateway

        UpdateGymRequest:
          Type: Api
          Properties:
            Path: /gym-requests/{id}
            Method: PUT
            RestApiId: !Ref Gateway

        DeleteGymRequest:
          Type: Api
          Properties:
            Path: /gym-requests/{id}
            Method: DELETE
            RestApiId: !Ref Gateway

        # Gym Announcements
        GetGymAnnouncement:
          Type: Api
          Properties:
            Path: /gym-announcements/{id}
            Method: GET
            RestApiId: !Ref Gateway
            
        GetGymAnnouncements:
          Type: Api
          Properties:
            Path: /gym-announcements
            Method: GET
            RestApiId: !Ref Gateway

        CreateGymAnnouncement:
          Type: Api
          Properties:
            Path: /gym-announcements
            Method: POST
            RestApiId: !Ref Gateway

        UpdateGymAnnouncement:
          Type: Api
          Properties:
            Path: /gym-announcements/{id}
            Method: PUT
            RestApiId: !Ref Gateway

        DeleteGymAnnouncement:
          Type: Api
          Properties:
            Path: /gym-announcements/{id}
            Method: DELETE
            RestApiId: !Ref Gateway

        # Gym Videos
        GetGymVideo:
          Type: Api
          Properties:
            Path: /gym-videos/{id}
            Method: GET
            RestApiId: !Ref Gateway
            
        GetGymVideos:
          Type: Api
          Properties:
            Path: /gym-videos
            Method: GET
            RestApiId: !Ref Gateway

        CreateGymVideo:
          Type: Api
          Properties:
            Path: /gym-videos
            Method: POST
            RestApiId: !Ref Gateway

        UpdateGymVideo:
          Type: Api
          Properties:
            Path: /gym-videos/{id}
            Method: PUT
            RestApiId: !Ref Gateway

        DeleteGymVideo:
          Type: Api
          Properties:
            Path: /gym-videos/{id}
            Method: DELETE
            RestApiId: !Ref Gateway

        # Gym Video Series
        GetGymVideoSeriesByID:
          Type: Api
          Properties:
            Path: /gym-video-series/{id}
            Method: GET
            RestApiId: !Ref Gateway
            
        GetGymVideoSeries:
          Type: Api
          Properties:
            Path: /gym-video-series
            Method: GET
            RestApiId: !Ref Gateway

        CreateGymVideoSeries:
          Type: Api
          Properties:
            Path: /gym-video-series
            Method: POST
            RestApiId: !Ref Gateway

        UpdateGymVideoSeries:
          Type: Api
          Properties:
            Path: /gym-video-series/{id}
            Method: PUT
            RestApiId: !Ref Gateway

        DeleteGymVideoSeries:
          Type: Api
          Properties:
            Path: /gym-video-series/{id}
            Method: DELETE
            RestApiId: !Ref Gateway

        # User Profiles
        GetUserProfiles:
          Type: Api
          Properties:
            Path: /user-profiles
            Method: GET
            RestApiId: !Ref Gateway

        CreateUserProfile:
          Type: Api
          Properties:
            Path: /user-profiles
            Method: POST
            RestApiId: !Ref Gateway

        UpdateUserProfile:
          Type: Api
          Properties:
            Path: /user-profiles/{id}
            Method: PUT
            RestApiId: !Ref Gateway

        DeleteUserProfile:
          Type: Api
          Properties:
            Path: /user-profiles/{id}
            Method: DELETE
            RestApiId: !Ref Gateway

        # Get Pre-signed S3 Upload/Download URLs
        GetS3SignedURL:
          Type: Api
          Properties:
            Path: /s3-presign-url
            Method: GET
            RestApiId: !Ref Gateway

        # Get user assets (avatars)
        AddUserAsset:
          Type: Api
          Properties:
            Path: /user-assets
            Method: POST
            RestApiId: !Ref Gateway

        GetUserAssetsByUserID:
          Type: Api
          Properties:
            Path: /user-assets/{id}
            Method: GET
            RestApiId: !Ref Gateway

        # Endpoint to add user to coach group in Cognito
        AddCoach:
          Type: Api
          Properties:
            Path: /cognito/add-coach
            Method: PUT
            RestApiId: !Ref Gateway
            Auth:
              Authorizer: NONE # Turn off Authorization for this event

        # Endpoint to get a user's group
        GetGroups:
          Type: Api
          Properties:
            Path: /cognito/get-groups
            Method: GET
            RestApiId: !Ref Gateway
            Auth:
              Authorizer: NONE # Turn off Authorization for this event

Outputs:
  API:
    Description: "API Gateway endpoint URL for the Lambda function"
    Value: !Sub "https://${Gateway}.execute-api.${AWS::Region}.amazonaws.com/"
  FunctionARN:
    Description: "Content Service Function ARN"
    Value: !GetAtt Function.Arn
  FunctionIAMRole:
    Description: "Implicit IAM Role created for Grapple Backend Lambda function"
    Value: !GetAtt FunctionRole.Arn